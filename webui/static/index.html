<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>EvoAgent</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app">
      <div class="shell-top" aria-label="顶部栏">
        <div class="shell-left">
          <div class="brand-title">EvoAgent</div>
          <div id="status" class="status-pill" aria-live="polite">连接中…</div>
        </div>
        <div class="shell-right">
          <div id="chatTitle" class="chat-titlebar hidden">
            <div id="chatTitleText" class="chat-title-text"></div>
            <div id="chatTitleMeta" class="chat-title-meta"></div>
          </div>
        </div>
      </div>

      <div class="body">
        <aside class="sidebar" aria-label="会话列表">
          <div class="sessions-top">
            <button id="newChat" class="btn btn-primary btn-small" type="button">新建会话</button>
            <select id="modelSelect" class="model-select model-select-sessions" aria-label="新会话模型"></select>
          </div>
          <div id="sessions" class="sessions" role="list"></div>
        </aside>

        <div class="right">
          <main class="chat" aria-label="对话区域">
            <div id="chatInner" class="chat-inner">
              <div class="empty">
                <div class="empty-title">开始对话</div>
              </div>
            </div>
            <div id="loading" class="loading hidden" aria-label="加载中">
              <div class="loading-spinner"></div>
              <div class="loading-text">加载中…</div>
            </div>
            <button id="jump" class="jump hidden" type="button">回到底部</button>
          </main>

          <footer class="composer" aria-label="输入区域">
            <div class="composer-inner">
              <textarea id="input" class="input" rows="1" placeholder="给 EvoAgent 发消息…（Shift+Enter 换行）" spellcheck="false"></textarea>
              <button id="send" class="btn btn-primary" type="button">发送</button>
            </div>
          </footer>
        </div>
      </div>
    </div>

    <noscript>此页面需要启用 JavaScript 才能显示事件流。</noscript>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
